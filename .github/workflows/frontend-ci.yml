name: Frontend CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build